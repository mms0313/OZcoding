<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilmLog | Sign Up</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages.css" />
  </head>
  <body>
    <div id="header"></div>

    <main class="auth-page">
      <div class="container auth-page__container">
        <form class="auth-form elevated">
          <h1 class="auth-form__title">Create Account</h1>
          <p class="auth-form__subtitle">
            FilmLog의 멤버가 되어 당신의 시선을 담아보세요.
          </p>

          <div class="auth-form__field">
            <label for="name" class="auth-form__label">이름</label>
            <input
              type="text"
              id="name"
              class="auth-form__input"
              placeholder="홍길동"
              required
            />
          </div>

          <div class="auth-form__field">
            <label for="email" class="auth-form__label">이메일</label>
            <input
              type="email"
              id="email"
              class="auth-form__input"
              placeholder="example@filmlog.com"
              required
            />
          </div>

          <div class="auth-form__field">
            <label for="password" class="auth-form__label">비밀번호</label>
            <input
              type="password"
              id="password"
              class="auth-form__input"
              placeholder="••••••••"
              required
            />
          </div>

          <div class="auth-form__field">
            <label for="password-confirm" class="auth-form__label"
              >비밀번호 확인</label
            >
            <input
              type="password"
              id="password-confirm"
              class="auth-form__input"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn btn--primary auth-form__submit">
            회원가입
          </button>

          <p class="auth-form__footer">
            이미 계정이 있으신가요?
            <a href="login.html" class="auth-form__link">로그인</a>
          </p>
        </form>
      </div>
    </main>

    <div id="footer"></div>

    <script src="js/include.js"></script>
  </body>
</html>
