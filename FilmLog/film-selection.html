<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>필름 선택 | FilmLog</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages.css" />
  </head>
  <body>
    <div id="header"></div>

    <main class="container">
      <section style="padding: 100px 0 40px">
        <a href="camera-selection.html" class="btn btn--back" title="뒤로가기"></a>
        <h1 class="hero__title" style="font-size: 40px">필름 장착</h1>
        <p class="hero__subtitle">보관하고 싶은 기록의 성격을 선택해 주세요.</p>
      </section>

      <div class="camera-grid">
        <article class="film-card elevated">
          <div class="film-card__meta">
            <span class="mono">ISO 400</span>
            <span class="mono">36 EXP</span>
          </div>
          <img
            src="img/kodak_gold.jpg"
            alt="코닥 골드"
            class="film-card__img"
          />
          <h3 class="film-card__title">코닥 골드 200-36</h3>
          <p class="film-card__desc">
            따뜻한 톤과 미세한 입자감 <br />인물 사진 찍기에 이상적입니다.
          </p>
          <a href="camera-view.html" class="btn btn--select">선택하기</a>
        </article>

        <article class="film-card elevated">
          <div class="film-card__meta">
            <span class="mono">ISO 400</span>
            <span class="mono">36 EXP</span>
          </div>
          <img
            src="img/kodak_plus.jpg"
            alt="코닥 컬러 플러스"
            class="film-card__img"
          />
          <h3 class="film-card__title">코닥 컬러 플러스 200-36</h3>
          <p class="film-card__desc">
            클래식한 컬러 필름 <br />높은 대비와 범용성을 자랑합니다.
          </p>
          <a href="camera-view.html" class="btn btn--select">선택하기</a>
        </article>

        <article class="film-card elevated">
          <div class="film-card__meta">
            <span class="mono">ISO 200</span>
            <span class="mono">36 EXP</span>
          </div>
          <img
            src="img/kodak_max.jpg"
            alt="코닥 울트라 맥스"
            class="film-card__img"
          />
          <h3 class="film-card__title">코닥 울트라 맥스 400-36</h3>
          <p class="film-card__desc">
            자연스러운 색상 표현으로 <br />풍경 사진 찍기에 좋습니다.
          </p>
          <button class="btn btn--select">선택하기</button>
        </article>
      </div>

      <script>
        const cards = document.querySelectorAll(".film-card");
        cards.forEach((card) => {
          card.addEventListener("click", () => {
            cards.forEach((c) => c.classList.remove("film-card--selected"));
            card.classList.add("film-card--selected");
          });
        });
      </script>
    </main>

    <div id="footer"></div>

    <script src="js/include.js"></script>
  </body>
</html>
