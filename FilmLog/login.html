<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilmLog | Login</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages.css" />
  </head>
  <body>
    <div id="header"></div>

    <main class="auth-page">
      <div class="container auth-page__container">
        <form class="auth-form elevated">
          <h1 class="auth-form__title">Welcome Back</h1>
          <p class="auth-form__subtitle">시선을 기록하는 여정을 계속하세요.</p>

          <div class="auth-form__field">
            <label for="email" class="auth-form__label">이메일</label>
            <input
              type="email"
              id="email"
              class="auth-form__input"
              placeholder="example@filmlog.com"
              required
            />
          </div>

          <div class="auth-form__field">
            <label for="password" class="auth-form__label">비밀번호</label>
            <input
              type="password"
              id="password"
              class="auth-form__input"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn btn--primary auth-form__submit">
            로그인
          </button>

          <p class="auth-form__footer">
            계정이 없으신가요?
            <a href="signup.html" class="auth-form__link">회원가입</a>
          </p>
        </form>
      </div>
    </main>

    <div id="footer"></div>

    <script src="js/include.js"></script>
  </body>
</html>
